<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>OSINT Tool v2 | osint.win</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <!-- EXIF LIB -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
</head>
<body>

<header class="menu">
    <div class="logo">OSINT.WIN</div>
    <div class="links">
        <span class="theme-toggle" id="themeToggle">🌙</span>
    </div>
</header>

<main class="container">

    <section class="hero">
        <h1>🧠 OSINT Tool v2</h1>
        <p>Strumenti OSINT completi per IP, DNS, Email, Hash, EXIF e backend</p>
    </section>

    <section class="dashboard">

        <div class="card">
            <h2>🌍 IP Lookup</h2>
            <input id="ipInput" placeholder="Es. 8.8.8.8">
            <button onclick="lookupIP()">Analizza IP</button>
            <div id="ipResult" class="results"></div>
        </div>

        <div class="card">
            <h2>🌐 DNS Lookup</h2>
            <input id="dnsInput" placeholder="Es. google.com">
            <button onclick="lookupDNS()">Analizza DNS</button>
            <div id="dnsResult" class="results"></div>
        </div>

        <div class="card">
            <h2>📧 Email Analysis</h2>
            <input id="emailInput" placeholder="Es. test@gmail.com">
            <button onclick="analyzeEmail()">Analizza Email</button>
            <div id="emailResult" class="results"></div>
        </div>

        <div class="card">
            <h2>🔐 Hash Generator (SHA-256)</h2>
            <input id="hashInput" placeholder="Inserisci testo">
            <button onclick="calcHash()">Genera Hash</button>
            <div id="hashResult" class="results"></div>
        </div>

        <div class="card">
            <h2>🖼️ EXIF Analyzer</h2>
            <input type="file" id="imageInput">
            <button onclick="analyzeImage()">Analizza immagine</button>
            <div id="imageResult" class="results"></div>
        </div>

        <div class="card">
            <h2>⚙️ Backend Tools</h2>
            <input id="domainInput" placeholder="Dominio (WHOIS)">
            <button onclick="backendFetch('whois', document.getElementById('domainInput').value)">WHOIS</button>

            <input id="usernameInput" placeholder="Username">
            <button onclick="backendFetch('username', document.getElementById('usernameInput').value)">Username Scan</button>

            <input id="portInput" placeholder="Host (es. example.com)">
            <button onclick="backendFetch('port', document.getElementById('portInput').value)">Port Scan</button>

            <pre id="backendResult" class="results"></pre>
        </div>

    </section>

</main>

<script src="script.js"></script>
</body>
</html>
