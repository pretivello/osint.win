<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>OSINT.WIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu">
        <div class="links">
            <a href="#username">Username</a>
            <a href="#domain">Dominio</a>
            <a href="#ip">IP</a>
            <a href="#dns">DNS</a>
            <a href="#exif">EXIF</a>
            <a href="#reverse">Reverse</a>
            <a href="#email">Email</a>
            <a href="#footprint">Footprint</a>
            <a href="#ports">Porte</a>
            <a href="#filemeta">FileMeta</a>
            <a href="#unshort">Unshort</a>
            <a href="#hash">Hash</a>
            <a href="#headers">Headers</a>
            <a href="#notes">Note</a>
            <a href="#stats">Stats</a>
            <a href="#report">Report</a>
        </div>
    </div>

    <!-- SEZIONE USERNAME -->
    <section id="username">
        <h2>Ricerca Username</h2>
        <input type="text" id="usernameInput" placeholder="Inserisci username">
        <button onclick="scan()">Scansiona</button>
        <div id="results"></div>
    </section>

    <!-- SEZIONE DOMINIO -->
    <section id="domain">
        <h2>Analisi Dominio</h2>
        <input type="text" id="domainInput" placeholder="Inserisci dominio">
        <button onclick="scanDomain()">Analizza</button>
        <div id="domain-results"></div>
    </section>

    <!-- SEZIONE EXIF -->
    <section id="exif">
        <h2>Analisi EXIF</h2>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="analyzeImage()">Analizza immagine</button>
        <div id="image-results"></div>
    </section>

    <!-- ALTRE SEZIONI (vuote per ora) -->
    <section id="ip"><h2>IP</h2></section>
    <section id="dns"><h2>DNS</h2></section>
    <section id="reverse"><h2>Reverse</h2></section>
    <section id="email"><h2>Email</h2></section>
    <section id="footprint"><h2>Footprint</h2></section>
    <section id="ports"><h2>Porte</h2></section>
    <section id="filemeta"><h2>FileMeta</h2></section>
    <section id="unshort"><h2>Unshort</h2></section>
    <section id="hash"><h2>Hash</h2></section>
    <section id="headers"><h2>Headers</h2></section>
    <section id="notes"><h2>Note</h2></section>
    <section id="stats"><h2>Stats</h2></section>
    <section id="report"><h2>Report</h2></section>

    <script src="script.js"></script>
</body>
</html>
