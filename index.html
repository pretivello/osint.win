<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>OSINT Tool v2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .box {
            background: #161b22;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        input, button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }

        input {
            background: #0d1117;
            color: white;
            border: 1px solid #30363d;
        }

        button {
            background: #238636;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2ea043;
        }

        .result {
            margin-top: 10px;
            padding: 10px;
            background: #0d1117;
            border-radius: 6px;
            border: 1px solid #30363d;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🧠 OSINT Tool v2</h1>

    <!-- IP LOOKUP -->
    <div class="box">
        <div class="title">🌍 IP Lookup</div>
        <input id="ipInput" placeholder="Es. 8.8.8.8">
        <button onclick="lookupIP()">Analizza IP</button>
        <div id="ipResult" class="result"></div>
    </div>

    <!-- DNS -->
    <div class="box">
        <div class="title">🌐 DNS Lookup</div>
        <input id="dnsInput" placeholder="Es. google.com">
        <button onclick="lookupDNS()">Analizza DNS</button>
        <div id="dnsResult" class="result"></div>
    </div>

    <!-- EMAIL -->
    <div class="box">
        <div class="title">📧 Email Analysis</div>
        <input id="emailInput" placeholder="Es. test@gmail.com">
        <button onclick="analyzeEmail()">Analizza Email</button>
        <div id="emailResult" class="result"></div>
    </div>

    <!-- HASH -->
    <div class="box">
        <div class="title">🔐 Hash Generator (SHA-256)</div>
        <input id="hashInput" placeholder="Inserisci testo">
        <button onclick="calcHash()">Genera Hash</button>
        <div id="hashResult" class="result"></div>
    </div>

    <!-- EXIF -->
    <div class="box">
        <div class="title">🖼️ EXIF Analyzer</div>
        <input type="file" id="imageInput">
        <button onclick="analyzeImage()">Analizza immagine</button>
        <div id="imageResult" class="result"></div>
    </div>

    <!-- BACKEND FEATURES -->
    <div class="box">
        <div class="title">⚙️ Backend Tools (richiede server)</div>

        <input id="domainInput" placeholder="Dominio (WHOIS)">
        <button onclick="whoisLookup()">WHOIS (server)</button>

        <input id="usernameInput" placeholder="Username">
        <button onclick="usernameScan()">Username Scan (server)</button>

        <input id="portInput" placeholder="Host (es. example.com)">
        <button onclick="portScan()">Port Scan (server)</button>

        <div id="backendResult" class="result"></div>
    </div>

</div>

<!-- EXIF LIB -->
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
