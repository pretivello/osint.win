<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>OSINT.WIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu">
        <div class="links">
            <a href="#username">Username</a>
            <a href="#domain">Dominio</a>
            <a href="#ip">IP</a>
            <a href="#dns">DNS</a>
            <a href="#exif">EXIF</a>
            <a href="#unshort">Unshort</a>
            <a href="#hash">Hash</a>
            <a href="#headers">Headers</a>
            <a href="#notes">Note</a>
        </div>
    </div>

    <!-- USERNAME -->
    <section id="username">
        <h2>Ricerca Username</h2>
        <input type="text" id="usernameInput" placeholder="Inserisci username">
        <button onclick="scan()">Scansiona</button>
        <div id="results"></div>
    </section>

    <!-- DOMINIO -->
    <section id="domain">
        <h2>Analisi Dominio</h2>
        <input type="text" id="domainInput" placeholder="Inserisci dominio">
        <button onclick="scanDomain()">Analizza</button>
        <div id="domain-results"></div>
    </section>

    <!-- IP -->
    <section id="ip">
        <h2>IP Lookup</h2>
        <input type="text" id="ipInput" placeholder="Inserisci IP (es. 1.1.1.1)">
        <button onclick="lookupIP()">Cerca IP</button>
        <div id="ip-results"></div>
    </section>

    <!-- DNS -->
    <section id="dns">
        <h2>DNS Lookup</h2>
        <input type="text" id="dnsInput" placeholder="Inserisci dominio (es. google.com)">
        <button onclick="lookupDNS()">Cerca DNS</button>
        <div id="dns-results"></div>
    </section>

    <!-- EXIF -->
    <section id="exif">
        <h2>Analisi EXIF</h2>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="analyzeImage()">Analizza immagine</button>
        <div id="image-results"></div>
    </section>

    <!-- UNSHORT -->
    <section id="unshort">
        <h2>Unshort URL</h2>
        <input type="text" id="unshortInput" placeholder="Inserisci URL accorciato">
        <button onclick="unshortURL()">Espandi</button>
        <div id="unshort-results"></div>
    </section>

    <!-- HASH -->
    <section id="hash">
        <h2>Calcolo Hash</h2>
        <textarea id="hashInput" placeholder="Inserisci testo o stringa"></textarea>
        <button onclick="calcHash()">Calcola Hash</button>
        <div id="hash-results"></div>
    </section>

    <!-- HEADERS -->
    <section id="headers">
        <h2>Analisi Headers HTTP</h2>
        <input type="text" id="headersInput" placeholder="Inserisci URL (https://...)">
        <button onclick="analyzeHeaders()">Analizza</button>
        <div id="headers-results"></div>
    </section>

    <!-- NOTE -->
    <section id="notes">
        <h2>Note</h2>
        <textarea id="notesInput" placeholder="Annotazioni indagine..."></textarea>
    </section>

    <script src="script.js"></script>
</body>
</html>
